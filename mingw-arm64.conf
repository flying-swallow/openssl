# OpenSSL 3.3.2 has no mingw aarch64 target (upstream added one later), so
# the header generator passes this file to Configure via --config. Only the
# values the generated headers consume matter here: bn_ops (bn_conf.h,
# configuration.h), sys_id (configuration.h) and the dso_scheme inherited
# from mingw-common (dso_conf.h).
my %targets = (
    "mingw-arm64" => {
        inherit_from     => [ "mingw-common" ],
        sys_id           => "MINGW64",
        bn_ops           => add("SIXTY_FOUR_BIT"),
        asm_arch         => 'aarch64',
        perlasm_scheme   => "win64",
        multilib         => "-arm64",
    },
);
